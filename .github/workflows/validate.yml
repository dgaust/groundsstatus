name: Validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml
          coverage: none
          tools: none

      - name: Lint all PHP files
        run: |
          find . -type f -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: "./"
          # The repo is named "groundsstatus" but the plugin's real slug (and
          # the folder it installs into) is wollongong-sportsground-status.
          slug: "wollongong-sportsground-status"
          exclude-directories: ".github"
          exclude-files: ".gitignore"
